<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration — Trustate</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="../assets/css/admin_auth.css">
</head>

<body>

    <div class="auth-card">
        <div class="auth-header">
            <a href="../index.html" class="auth-logo">
                <span class="auth-logo-text">Trustate</span>
                <span class="dot"></span>
            </a>
            <h1 class="auth-title">Create Admin Profile</h1>
            <p class="auth-sub">Security clearance required for registration.</p>
        </div>

        <form class="auth-form" id="signupForm">
            <div class="form-group">
                <label class="form-label" for="fullname">Full Name</label>
                <input type="text" id="fullname" class="form-input" placeholder="e.g. Rahul Sharma" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Work Email</label>
                <input type="email" id="email" class="form-input" placeholder="admin@landify.com" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Access Password</label>
                <input type="password" id="password" class="form-input" placeholder="Create a strong password" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="accesskey">Security Access Key</label>
                <input type="text" id="accesskey" class="form-input" placeholder="Enter registration key" required>
            </div>

            <button type="submit" class="auth-btn" id="submitBtn">
                Create Account →
            </button>
        </form>

        <div class="auth-foot">
            Already have an account? <a href="admin_login.html">Sign In</a>
        </div>
    </div>

    <!-- Error Toast -->
    <div class="auth-toast" id="toast">Signup failed</div>

    <!-- JS -->
    <script src="../assets/js/admin_auth.js"></script>
</body>

</html>
